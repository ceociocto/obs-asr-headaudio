<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="data:,">

  <title>HeadAudio - GLM TTS</title>

  <style>
    body, html {
      width:100%; height:100%; margin: 0; padding: 0; position: relative;
      background-color: #202020; color: white; overflow: hidden;
      font-family: Arial;
    }
    #head { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
    #avatar {
      display: block; width: 100%; height: 100%; position: absolute;
      top: 0; left: 0; right: 0; margin: 0; padding: 0;
    }
    #info {
      display: block; position: absolute; bottom: 10px; left: 10px;
      right: 10px; font-family: Arial; font-size: 20px;
    }
    #controls {
      position: absolute; top: 0; right: 0; margin: 10px; z-index: 10;
      display: flex; flex-direction: column; gap: 8px;
      background: rgba(0,0,0,0.7);
      padding: 16px;
      border-radius: 12px;
      min-width: 250px;
    }
    #github {
      position: absolute; bottom: 0; right: 0; margin: 10px; z-index: 10;
      width: 36px; height: 36px;
    }
    #github svg { color: #404040; }
    *[disabled] {
      opacity: 0.5; cursor: default; pointer-events: none;
    }
    .control-group {
      display: flex; flex-direction: column; gap: 4px;
    }
    .control-group label {
      font-size: 11px; color: #aaa; text-transform: uppercase;
    }
    input[type="text"], textarea, select {
      padding: 8px 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #333;
      color: white;
      font-size: 13px;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none; border-color: #667eea;
    }
    textarea {
      resize: none;
      min-height: 80px;
    }
    .slider-row {
      display: flex; align-items: center; gap: 8px;
    }
    .slider-row input[type="range"] {
      flex: 1; accent-color: #667eea;
    }
    .slider-value {
      min-width: 35px; text-align: right; font-size: 12px; color: #667eea;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      background: #444;
    }
    .status {
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      display: none;
    }
    .status.loading { display: block; background: rgba(102, 126, 234, 0.3); color: #667eea; }
    .status.success { display: block; background: rgba(72, 187, 120, 0.3); color: #48bb78; }
    .status.error { display: block; background: rgba(245, 101, 101, 0.3); color: #f56565; }
    .quick-phrases {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
    }
    .phrase-btn {
      padding: 6px 10px;
      font-size: 11px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .phrase-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.2);
      transform: none;
      box-shadow: none;
    }
  </style>

  <script type="importmap">
  { "imports":
    {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/npm/@met4citizen/talkinghead@1.7/modules/talkinghead.mjs",
      "headaudio": "./dist/headaudio.min.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import { HeadAudio } from "headaudio";

    /**
    * GLOBALS
    */

    // TalkingHead
    let head;
    const avatar = {
      url: "./avatars/julia.glb",
      body: "F",
      avatarMood: "neutral"
    };

    // HeadAudio
    let headaudio;
    const headaudioProcessor = "./dist/headworklet.min.mjs";
    const headaudioModel = "./dist/model-en-mixed.bin";

    // Configuration
    const config = {
      apiKey: "",  // Please enter your API key in the UI
      model: "glm-tts",
      voice: "female",
      speed: 1.0,
      volume: 1.0,
      format: "wav"
    };

    // DOM elements
    const el = {};

    // Audio source
    let currentSource = null;

    /**
    * Wrap a promise with a timeout
    */
    function _withTimeout(promise, ms, error = new Error("Timeout")) {
      return new Promise((resolve, reject) => {
        const id = setTimeout(() => reject(error), ms);
        promise
          .then(val => { clearTimeout(id); resolve(val); })
          .catch(err => { clearTimeout(id); reject(err); });
      });
    }

    /**
    * Resumes the AudioContext
    */
    async function resumeAudio() {
      head.start();
      if (head.audioCtx.state !== "running") {
        try {
          await _withTimeout(head.audioCtx.resume(), 2000);
        } catch (e) {
          console.error(e);
        }
      }
    }

    /**
    * Instantiate the TalkingHead class
    */
    function initHead() {
      head = new TalkingHead(el.avatar, {
        ttsEndpoint: "N/A",
        lipsyncModules: [],
        cameraView: "upper",
        mixerGainSpeech: 3,
        cameraDistance: -0.9,
        cameraRotateEnable: false,
        lightAmbientIntensity: 0.7,
        lightDirectIntensity: 1.2,
        lightSpotIntensity: 0.8
      });
      window.head = head;
    }

    /**
    * Instantiate HeadAudio
    */
    async function initHeadAudio() {
      await head.audioCtx.audioWorklet.addModule(headaudioProcessor);
      headaudio = new HeadAudio(head.audioCtx);
      window.headaudio = headaudio;

      try {
        await headaudio.loadModel(headaudioModel);
      } catch(error) {
        console.log(error);
      }

      head.audioSpeechGainNode.connect(headaudio);
      // Connect to destination for audio output
      head.audioSpeechGainNode.connect(head.audioCtx.destination);

      headaudio.onvalue = (key, value) => {
        Object.assign(head.mtAvatar[key], { newvalue: value, needsUpdate: true });
      };

      head.opt.update = headaudio.update.bind(headaudio);

      // Track when speech starts/ends
      let lastEnded = Date.now();
      headaudio.onended = () => {
        lastEnded = Date.now();
        head.setMood("neutral");
        el["speak-btn"].disabled = false;
        hideStatus();
      };

      headaudio.onstarted = () => {
        const duration = Date.now() - lastEnded;
        if (duration > 150) {
          head.lookAtCamera(500);
          head.speakWithHands();
        }
        head.setMood("happy");
      };
    }

    /**
    * Load the avatar
    */
    async function loadAvatar() {
      const info = { head: "-" };
      const updateInfo = (n, ev) => {
        if (ev) {
          if (ev.lengthComputable) {
            info[n] = Math.min(100, Math.round(ev.loaded / ev.total * 100)) + "%";
          } else {
            info[n] = Math.round(ev.loaded / 1000) + "KB";
          }
        }
        let s = "Loading: " + info.head;
        if (info.hasOwnProperty("error")) {
          s += " ERROR:<br>&gt; " + info.error.replaceAll("\n", "<br>&gt; ");
        }
        el.info.innerHTML = s;
      };

      try {
        el["speak-btn"].disabled = true;
        el.info.style.display = "block";
        el.info.textContent = "Loading...";

        await head.showAvatar(avatar, updateInfo.bind(null, "head"));

        el.info.style.display = "none";
        el["speak-btn"].disabled = false;
      } catch (error) {
        console.log(error);
        info.error = error.message?.slice() || "Unknown error.";
        updateInfo();
      }
    }

    /**
    * Call GLM TTS API
    */
    async function callGLMTTS(text) {
      const response = await fetch("https://open.bigmodel.cn/api/paas/v4/audio/speech", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${config.apiKey}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: config.model,
          input: text,
          voice: config.voice,
          speed: config.speed,
          volume: config.volume,
          response_format: config.format
        })
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`HTTP ${response.status}: ${errorText}`);
      }

      return await response.arrayBuffer();
    }

    /**
    * Play audio through HeadAudio with lip-sync
    */
    async function speak(text) {
      if (!text.trim()) {
        showStatus("error", "请输入要播放的文本");
        return;
      }

      el["speak-btn"].disabled = true;
      showStatus("loading", "正在生成语音...");

      try {
        // Stop any current audio
        if (currentSource) {
          try { currentSource.stop(); } catch(e) {}
          currentSource = null;
        }
        headaudio.stop();

        // Get audio from GLM TTS
        const audioBuffer = await callGLMTTS(text);
        showStatus("success", "正在播放...");

        // Decode and play
        const decodedBuffer = await head.audioCtx.decodeAudioData(audioBuffer);

        // Create and connect source
        currentSource = head.audioCtx.createBufferSource();
        currentSource.buffer = decodedBuffer;
        currentSource.connect(head.audioSpeechGainNode);

        // Start lip-sync
        headaudio.start();

        // Start playback
        currentSource.start(0);

        // Cleanup when done
        currentSource.onended = () => {
          currentSource = null;
          headaudio.stop();
          hideStatus();
          el["speak-btn"].disabled = false;
        };

      } catch (error) {
        console.error("Speech error:", error);
        showStatus("error", `错误: ${error.message}`);
        el["speak-btn"].disabled = false;
        headaudio.stop();
      }
    }

    /**
    * Show/hide status
    */
    function showStatus(type, message) {
      el["status"].className = `status ${type}`;
      el["status"].textContent = message;
    }

    function hideStatus() {
      el["status"].className = "status";
      el["status"].textContent = "";
      el["status"].style.display = "none";
    }

    /**
    * Save/Load config
    */
    function saveConfig() {
      config.apiKey = el["api-key"].value;
      config.voice = el.voice.value;
      config.speed = parseFloat(el.speed.value);
      config.volume = parseFloat(el.volume.value);

      localStorage.setItem("glm_tts_config", JSON.stringify({
        apiKey: config.apiKey,
        voice: config.voice,
        speed: config.speed,
        volume: config.volume
      }));
    }

    function loadConfig() {
      const saved = localStorage.getItem("glm_tts_config");
      if (saved) {
        const parsed = JSON.parse(saved);
        el["api-key"].value = parsed.apiKey || config.apiKey;
        el.voice.value = parsed.voice || config.voice;
        el.speed.value = parsed.speed || config.speed;
        el.volume.value = parsed.volume || config.volume;

        config.apiKey = parsed.apiKey || config.apiKey;
        config.voice = parsed.voice || config.voice;
        config.speed = parsed.speed || config.speed;
        config.volume = parsed.volume || config.volume;
      }

      // Update slider values
      el["speed-value"].textContent = config.speed.toFixed(1);
      el["volume-value"].textContent = config.volume.toFixed(1);
    }

    /**
    * Page loaded
    */
    document.addEventListener("DOMContentLoaded", async function() {
      // Get DOM elements
      document.querySelectorAll("[id]").forEach(x => el[x.id] = x);

      // Init head and headaudio
      initHead();
      head.start();  // Initialize audio context
      await initHeadAudio();

      // Load config
      loadConfig();

      // Config change handlers
      el["api-key"].addEventListener("change", saveConfig);
      el.voice.addEventListener("change", saveConfig);

      el.speed.addEventListener("input", () => {
        el["speed-value"].textContent = parseFloat(el.speed.value).toFixed(1);
        saveConfig();
      });

      el.volume.addEventListener("input", () => {
        el["volume-value"].textContent = parseFloat(el.volume.value).toFixed(1);
        saveConfig();
      });

      // Speak button
      el["speak-btn"].addEventListener("click", async function() {
        await resumeAudio();
        speak(el["text-input"].value);
      });

      // Enter key to speak
      el["text-input"].addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          if (!el["speak-btn"].disabled) {
            el["speak-btn"].click();
          }
        }
      });

      // Quick phrases
      document.querySelectorAll(".phrase-btn").forEach(btn => {
        btn.addEventListener("click", function() {
          el["text-input"].value = this.textContent;
          if (!el["speak-btn"].disabled) {
            el["speak-btn"].click();
          }
        });
      });

      // Visibility change
      document.addEventListener("visibilitychange", async function() {
        if (document.visibilityState === "visible") {
          head.start();
          headaudio.start();
        } else {
          headaudio.stop();
          head.stop();
        }
      });

      // Load avatar
      await loadAvatar();
    });

  </script>
</head>

<body>
  <div id="head">
    <div id="avatar"></div>
    <div id="info"></div>
  </div>

  <div id="controls">
    <div class="control-group">
      <label>API Key</label>
      <input id="api-key" type="text" placeholder="智谱AI API Key" />
    </div>

    <div class="control-group">
      <label>声音类型</label>
      <select id="voice">
        <option value="female" selected>女声</option>
        <option value="male">男声</option>
        <option value="emotion-yujie">情感-语杰</option>
        <option value="emotion-zhitian">情感-智甜</option>
        <option value="emotion-zhiwei">情感-智伟</option>
        <option value="emotion-zhifei">情感-志飞</option>
      </select>
    </div>

    <div class="control-group">
      <label>语速 <span id="speed-value">1.0</span></label>
      <div class="slider-row">
        <input id="speed" type="range" min="0.25" max="4" step="0.1" value="1.0" />
      </div>
    </div>

    <div class="control-group">
      <label>音量 <span id="volume-value">1.0</span></label>
      <div class="slider-row">
        <input id="volume" type="range" min="0.1" max="10" step="0.1" value="1.0" />
      </div>
    </div>

    <div class="control-group">
      <label>输入文本 (Enter播放)</label>
      <textarea id="text-input" placeholder="输入要播放的文本...">你好呀，欢迎来到智谱开放平台</textarea>
    </div>

    <button id="speak-btn">播放</button>
    <div id="status" class="status"></div>

    <div class="control-group">
      <label>快捷短语</label>
      <div class="quick-phrases">
        <button class="phrase-btn">你好</button>
        <button class="phrase-btn">谢谢</button>
        <button class="phrase-btn">再见</button>
        <button class="phrase-btn">早上好</button>
        <button class="phrase-btn">很高兴见到你</button>
      </div>
    </div>
  </div>

  <div id="github">
    <a href="https://github.com/met4citizen/HeadAudio">
      <svg viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" fill="currentColor"/>
      </svg>
    </a>
  </div>
</body>
