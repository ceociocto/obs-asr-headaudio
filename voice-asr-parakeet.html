<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HeadAudio - Captions Query</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶栏 */
    #topbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: #1a1a2e;
      align-items: center;
      z-index: 10;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #444;
    }
    .dot.on { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .dot.busy { background: #60a5fa; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: .5; } }
    #topbar span { font-size: 12px; margin-right: 12px; }

    /* 头像区 */
    #avatar {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #avatar canvas { max-width: 100%; max-height: 100%; }

    /* 底栏 */
    #bottombar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: #1a1a2e;
      align-items: center;
      z-index: 10;
    }
    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #252540;
      color: #fff;
      font-size: 15px;
    }
    #input:focus { outline: none; border-color: #667eea; }
    #input::placeholder { color: #666; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      white-space: nowrap;
    }
    #speak-btn { background: linear-gradient(135deg, #667eea, #7c3aed); }
    .btn:active { transform: scale(.96); }

    /* 右侧信息面板 */
    #info-panel {
      position: fixed;
      right: 12px;
      top: 60px;
      width: 320px;
      max-height: calc(100vh - 120px);
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
      overflow-y: auto;
      z-index: 10;
    }
    #info-panel h3 {
      font-size: 14px;
      color: #2d8cff;
      margin-bottom: 12px;
    }
    .info-item {
      font-size: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .info-label { color: #666; }
    .info-value { color: #ccc; }
    .result-item {
      font-size: 11px;
      padding: 8px;
      background: #252540;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .result-speaker { color: #2d8cff; font-weight: 500; }
    .result-text { color: #ddd; margin-top: 4px; }
  </style>
</head>
<body>

  <div id="topbar">
    <div class="dot" id="wsDot"></div><span>WebSocket</span>
    <div class="dot" id="dbDot"></div><span>Captions DB</span>
    <div class="dot" id="ttsDot"></div><span>TTS</span>
  </div>

  <div id="avatar"></div>

  <div id="info-panel">
    <h3>Captions Database Query</h3>
    <div id="stats">
      <div class="info-item">
        <span class="info-label">Status</span>
        <span class="info-value">Connecting...</span>
      </div>
    </div>
    <div id="results"></div>
  </div>

  <div id="bottombar">
    <input id="input" placeholder="Ask about the meeting captions..." />
    <button class="btn" id="speak-btn">Ask</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/npm/@met4citizen/talkinghead@1.7/modules/talkinghead.mjs",
      "headaudio": "./dist/headaudio.min.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import { HeadAudio } from "headaudio";

    // --- DOM ---
    const $ws = document.getElementById("wsDot");
    const $db = document.getElementById("dbDot");
    const $tts = document.getElementById("ttsDot");
    const $input = document.getElementById("input");
    const $speak = document.getElementById("speak-btn");
    const $stats = document.getElementById("stats");
    const $results = document.getElementById("results");

    // --- 全局 ---
    let head, headaudio, ws;

    // ========== TalkingHead + HeadAudio ==========
    async function init() {
      const container = document.getElementById("avatar");

      head = new TalkingHead(container, {
        ttsEndpoint: "N/A",
        lipsyncModules: [],
        cameraView: "upper",
        mixerGainSpeech: 3,
        cameraDistance: -0.9,
      });
      window.head = head;
      await head.start();

      // HeadAudio 口型同步
      await head.audioCtx.audioWorklet.addModule("./dist/headworklet.min.mjs");
      headaudio = new HeadAudio(head.audioCtx);
      try { await headaudio.loadModel("./dist/model-en-mixed.bin"); } catch {}
      head.audioSpeechGainNode.connect(headaudio);
      head.audioSpeechGainNode.connect(head.audioCtx.destination);
      headaudio.onvalue = (k, v) => {
        if (head.mtAvatar[k])
          Object.assign(head.mtAvatar[k], { newvalue: v, needsUpdate: true });
      };
      head.opt.update = headaudio.update.bind(headaudio);
      headaudio.onstarted = () => head.setMood("happy");
      headaudio.onended = () => head.setMood("neutral");
      window.headaudio = headaudio;

      await head.showAvatar({ url: "./avatars/julia.glb", body: "F", avatarMood: "neutral" });
    }

    // ========== WebSocket ==========
    function connectWS() {
      ws = new WebSocket("ws://localhost:8767");
      ws.onopen = () => $ws.classList.add("on");
      ws.onclose = () => { $ws.classList.remove("on"); setTimeout(connectWS, 3000); };
      ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === "ready") {
          if (d.captions) {
            $db.classList.add("on");
            updateStats(d.stats);
          }
        } else if (d.type === "answer") {
          $db.classList.add("on");
          if (d.text) {
            showResult(d.text, d.captions);
            speak(d.text);
          }
        }
      };
    }

    function updateStats(stats) {
      if (!stats) return;
      $stats.innerHTML = `
        <div class="info-item">
          <span class="info-label">Meetings</span>
          <span class="info-value">${stats.meetings || 0}</span>
        </div>
        <div class="info-item">
          <span class="info-label">Captions</span>
          <span class="info-value">${stats.captions || 0}</span>
        </div>
        <div class="info-item">
          <span class="info-label">Participants</span>
          <span class="info-value">${stats.participants || 0}</span>
        </div>
      `;
    }

    function showResult(answer, captions) {
      let html = `<div class="result-item"><div style="color: #4ade80; font-weight: 500;">Answer</div><div style="color: #ddd; margin-top: 4px;">${escapeHTML(answer)}</div></div>`;

      if (captions && captions.length > 0) {
        html += `<div style="font-size: 11px; color: #666; margin: 8px 0;">Related captions:</div>`;
        captions.forEach(c => {
          html += `
            <div class="result-item">
              <div class="result-speaker">${escapeHTML(c.speaker || "Speaker")}</div>
              <div class="result-text">${escapeHTML(c.text)}</div>
            </div>
          `;
        });
      }

      $results.innerHTML = html;
    }

    function escapeHTML(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== TTS ==========
    let selectedVoice = null;
    function loadVoices() {
      const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith("en"));
      selectedVoice = voices.find(v => v.name.includes("Samantha"))
                   || voices.find(v => v.name.includes("Google"))
                   || voices[0]
                   || null;
    }
    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    // 口型动画
    let mouthAnimId = null, mouthInterval = null, mouthCurrent = 0, mouthTarget = 0;

    function animateMouth() {
      const mt = head?.mtAvatar;
      if (!mt) return;
      mouthCurrent += (mouthTarget - mouthCurrent) * 0.3;
      if (mt.jawOpen)    Object.assign(mt.jawOpen,    { newvalue: mouthCurrent, needsUpdate: true });
      if (mt.mouthSmileLeft)  Object.assign(mt.mouthSmileLeft,  { newvalue: mouthCurrent * 0.3, needsUpdate: true });
      if (mt.mouthSmileRight) Object.assign(mt.mouthSmileRight, { newvalue: mouthCurrent * 0.3, needsUpdate: true });
      mouthAnimId = requestAnimationFrame(animateMouth);
    }

    function startMouthAnim() {
      mouthCurrent = 0; mouthTarget = 0.3;
      animateMouth();
      mouthInterval = setInterval(() => { mouthTarget = Math.random() * 0.55 + 0.05; }, 100);
    }

    function stopMouthAnim() {
      if (mouthAnimId)  { cancelAnimationFrame(mouthAnimId); mouthAnimId = null; }
      if (mouthInterval) { clearInterval(mouthInterval); mouthInterval = null; }
      const mt = head?.mtAvatar;
      if (!mt) return;
      if (mt.jawOpen)    Object.assign(mt.jawOpen,    { newvalue: 0, needsUpdate: true });
      if (mt.mouthSmileLeft)  Object.assign(mt.mouthSmileLeft,  { newvalue: 0, needsUpdate: true });
      if (mt.mouthSmileRight) Object.assign(mt.mouthSmileRight, { newvalue: 0, needsUpdate: true });
    }

    function speak(text) {
      if (!text) return;
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      utter.rate = 1.0;
      if (selectedVoice) utter.voice = selectedVoice;

      $tts.classList.add("busy");
      if (head) head.setMood("happy");
      startMouthAnim();

      const done = () => {
        $tts.classList.remove("busy");
        stopMouthAnim();
        if (head) head.setMood("neutral");
      };
      utter.onend = done;
      utter.onerror = done;

      speechSynthesis.speak(utter);
    }

    // ========== 事件 ==========
    function sendQuery() {
      const text = $input.value.trim();
      if (text && ws?.readyState === 1) {
        ws.send(JSON.stringify({ type: "text", text }));
        $input.value = "";
      }
    }

    $speak.addEventListener("click", sendQuery);
    $input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendQuery();
    });

    // ========== 启动 ==========
    await init();
    connectWS();
  </script>
</body>
</html>
